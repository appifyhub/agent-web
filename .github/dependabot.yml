version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "10:00"
      timezone: "Europe/Berlin"
    groups:
      npm-all:
        patterns:
          - "*"
    ignore:
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "@eslint/js"
        versions: [">=10.0.0"]
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    labels:
      - "Dependabot"
